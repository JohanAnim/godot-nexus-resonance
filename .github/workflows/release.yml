name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: ubuntu-22.04
            platform: windows
            artifact_name: nexus_resonance-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure submodules (fallback if checkout missed them)
        run: |
          if [ ! -f src/lib/godot-cpp/SConstruct ]; then
            mkdir -p src/lib
            git clone -b 4.5 --depth 1 https://github.com/godotengine/godot-cpp src/lib/godot-cpp
          fi

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Add GCC problem matcher
        run: echo "::add-matcher::${{ github.workspace }}/.github/gcc-problem-matcher.json"

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-${{ runner.os }}-${{ matrix.platform }}-v2-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct', 'src/register_types.cpp', 'src/resonance_server.cpp') }}
          restore-keys: |
            scons-${{ runner.os }}-${{ matrix.platform }}-

      - name: (Windows) Install mingw64
        if: matrix.platform == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true

      - name: Install SCons (Linux/Windows)
        if: matrix.platform != 'macos'
        run: |
          python3 -m pip install scons
          scons --version

      - name: Install SCons (macOS)
        if: matrix.platform == 'macos'
        run: |
          python3 -m pip install --break-system-packages scons
          scons --version

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin

      - name: Build GDExtension (Linux/Windows)
        if: matrix.platform != 'macos'
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=${{ matrix.platform }} target=editor arch=x86_64 build_tests=0 -j$(nproc)

      - name: Build GDExtension (macOS)
        if: matrix.platform == 'macos'
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=macos target=editor arch=universal build_tests=0 -j$(sysctl -n hw.ncpu)

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p release_${{ matrix.artifact_name }}/addons/nexus_resonance
          cp -r audio_resonance_tool/addons/nexus_resonance/* release_${{ matrix.artifact_name }}/addons/nexus_resonance/
          cp LICENSE release_${{ matrix.artifact_name }}/addons/nexus_resonance/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_${{ matrix.artifact_name }}

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.ref }}

      - name: Ensure submodules (fallback)
        run: |
          if [ ! -f src/lib/godot-cpp/SConstruct ]; then
            mkdir -p src/lib
            git clone -b 4.5 --depth 1 https://github.com/godotengine/godot-cpp src/lib/godot-cpp
          fi
          if [ ! -f src/lib/catch2/catch.hpp ]; then
            git clone -b v2.x --depth 1 https://github.com/catchorg/Catch2 /tmp/Catch2
            mkdir -p src/lib/catch2
            cp /tmp/Catch2/single_include/catch2/catch.hpp src/lib/catch2/
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive
        run: |
          mkdir -p release_packages
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../../release_packages/${name}.zip" .)
          done

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create source code archive (full project with submodules)
        run: |
          zip -r release_packages/nexus_resonance-source-v${{ steps.version.outputs.version }}.zip . \
            -x ".git/*" -x ".scons-cache/*" -x "build/*" \
            -x "audio_resonance_tool/.godot/*" -x "src/lib/steamaudio/*" \
            -x "audio_resonance_tool/addons/nexus_resonance/bin/*" -x "*.pyc"

      - name: Prepare release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CHANGELOG_SECTION=$(VERSION="$VERSION" CHANGELOG_PATH="docs/CHANGELOG.md" python3 .github/scripts/extract_changelog.py)
          {
            echo "$CHANGELOG_SECTION"
            echo ""
            echo "## Installation"
            echo ""
            echo "### Asset Store / Ready-to-use Addon"
            echo ""
            echo "**nexus_resonance-windows.zip** – Addon mit Windows-Binaries. Entpacken in \`addons/\` deines Godot-Projekts."
            echo ""
            echo "### Vollständiger Quellcode"
            echo ""
            echo "**nexus_resonance-source-v${VERSION}.zip** – Gesamtes Projekt inkl. godot-cpp, Catch2. Nach dem Entpacken: \`python scripts/install_steam_audio.py\` und \`scons platform=windows target=editor\`."
            echo ""
            echo "macOS/Linux: Repo klonen und lokal mit \`scons platform=<os> target=editor\` bauen."
            echo ""
            echo "Siehe [README](https://github.com/${{ github.repository }}) für Anforderungen und Nutzung."
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release_body.md
          files: release_packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
